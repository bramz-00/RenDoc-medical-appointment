spring.application.name=rendoc
server.port=9191
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rendoc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me_in_production}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
api.prefix=/api/v1
app.jwtSecret=your-very-strong-secret-key-must-be-at-least-32-characters
app.jwtExpirationMs=86400000
logging.level.org.springframework.security=DEBUG
logging.level.com.app.rendoc.config=DEBUG

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Actuator – expose health endpoint for Docker health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
