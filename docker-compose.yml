# =============================================================================
#  RenDoc – Docker Compose
#  Services: postgres · server (Spring Boot) · client (Vite → nginx)
#
#  Usage:
#    cp .env.example .env        # fill in secrets
#    docker compose up --build   # first run
#    docker compose up -d        # subsequent runs (detached)
#    docker compose logs -f      # tail all logs
# =============================================================================

name: rendoc

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL – latest stable release
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: rendoc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Named volume keeps data between container re-creates
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to host so you can connect with pgAdmin / DBeaver
      - "5432:5432"
    networks:
      - rendoc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Spring Boot API
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
    container_name: rendoc_server
    restart: unless-stopped
    environment:
      # DataSource – point at the postgres service by its container hostname
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Spring JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO:             update
      SPRING_JPA_SHOW_SQL:                       "false"
      # JWT
      APP_JWTSECRET:        ${JWT_SECRET}
      APP_JWTEXPIRATIONMS:  ${JWT_EXPIRATION_MS:-86400000}
      # CORS – allow the nginx client origin
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
    ports:
      # Only needed for direct access/debugging; nginx proxies /api/ in prod
      - "9191:9191"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rendoc_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9191/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # React / Vite – built by nginx, reverse-proxied to the Spring Boot API
  # ---------------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runtime
      args:
        # Vite replaces VITE_* at build time
        VITE_API_BASE_URL_V1: ${VITE_API_BASE_URL_V1:-/api/v1}
    container_name: rendoc_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - rendoc_net

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  rendoc_net:
    driver: bridge
